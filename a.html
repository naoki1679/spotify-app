<!DOCTYPE html>
        <html>
            <head>
                <meta charset="UTF-8">
                <title>test</title>
                <link rel="stylesheet" href="a.css">
                <!-- ReactとReactDOMをCDNから読み込む -->
                <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
                <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
                <!-- JSXを使うためのBabel -->
                <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
            </head>
            <body>
                <header>
                    <h1>プロダクト名</h1> 
                    <ul class="a">
                        <li>みんなの曲の好みがわかる</li>
                        <li>普段聞いている曲をランキング化</li>
                    </ul> 
                </header> 

                <div id="root"></div>

                <script type="text/babel">
                    function App() {
                        const [message, setMessage] = React.useState("");

                        const updateUI = () => {
                            setMessage('Hello World');
                        }
                        const undoUI = () => {
                            setMessage('');
                        }
                        
                        return (
                            <div>
                                <button onClick={updateUI}>update</button>
                                <button onClick={undoUI}>unDo</button>
                                <h3>kinket'sの共通曲ランキング</h3>
                                <ol>
                                    <li>Blue Jeans</li>
                                    <li>ライラック</li>
                                    <li>BAD LOVE</li>
                                    <li>IRIS OUT</li>
                                    <li>ROSE</li>
                                </ol>
            
                                <table>
                                    <tr></tr>
                                </table>
                                <div>
                                <p>メンバーリスト</p>
                                <p><ins>メンバーリスト</ins></p>
                                <abbr title="World Wide Web">WWW</abbr>
                                <p><font size="5">こんにちは</font></p>

                                <ul>
                                    <li>たすく</li>
                                    <li>あつし</li>
                                    <li>れん</li>
                                    <li>ひろと</li>
                                    <li>よしき</li>
                                    <li>なおき</li>
                                </ul>
                                {message}
                                </div>
                            </div>
                        );
                    }
                    
                    const root = ReactDOM.createRoot(document.getElementById('root'));
                    root.render(<App />);
                </script>
            </body>
        </html>
